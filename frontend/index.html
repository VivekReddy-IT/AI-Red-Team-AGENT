<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Red Team Agent</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --border-color: #334155;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --high-sev: #ef4444;
            --high-sev-bg: rgba(239, 68, 68, 0.1);
            --medium-sev: #f59e0b;
            --medium-sev-bg: rgba(245, 158, 11, 0.1);
            --low-sev: #10b981;
            --low-sev-bg: rgba(16, 185, 129, 0.1);
            --card-bg: #1e293b;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 2rem;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #60a5fa, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .scan-box, .report-box {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border: 1px solid var(--border-color);
            margin-bottom: 2rem;
            display: flex;
            gap: 1rem;
        }

        input[type="url"], input[type="text"] {
            flex-grow: 1;
            padding: 1rem;
            background-color: #0f172a;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            transition: all 0.2s;
        }

        input[type="url"]:focus, input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        button {
            padding: 1rem 2rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        button:hover:not(:disabled) {
            background-color: var(--primary-hover);
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        th, td {
            padding: 1rem 1.5rem;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background-color: rgba(255, 255, 255, 0.05);
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
        }

        tr.high-severity {
            background-color: var(--high-sev-bg);
            border-left: 4px solid var(--high-sev);
        }

        tr.medium-severity {
            background-color: var(--medium-sev-bg);
            border-left: 4px solid var(--medium-sev);
        }

        tr.low-severity {
            background-color: var(--low-sev-bg);
            border-left: 4px solid var(--low-sev);
        }

        .severity-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .badge-High { color: #fca5a5; background-color: rgba(239, 68, 68, 0.2); }
        .badge-Medium { color: #fcd34d; background-color: rgba(245, 158, 11, 0.2); }
        .badge-Low { color: #6ee7b7; background-color: rgba(16, 185, 129, 0.2); }

        .ai-description {
            font-size: 0.95rem;
            color: #cbd5e1;
            white-space: pre-wrap;
        }
        
        .code-payload {
            background-color: rgba(0,0,0,0.3);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-family: monospace;
            color: #93c5fd;
            word-wrap: break-word;
        }

        #error-msg {
            color: #ef4444;
            background-color: rgba(239, 68, 68, 0.1);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
        }

        #stats-bar {
            display: none;
            margin-bottom: 1rem;
            padding: 1rem;
            background: var(--card-bg);
            border-radius: 8px;
            color: #94a3b8;
        }
        
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #64748b;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>AI Red Team Agent</h1>
        <p>Enter a URL to identify and analyze basic web vulnerabilities</p>
    </header>

    <div class="scan-box">
        <input type="url" id="targetUrl" placeholder="https://example.com" required>
        <button id="scanBtn">
            <span>Scan Target</span>
            <div class="loader" id="loader"></div>
        </button>
    </div>

    <div class="report-box">
        <input type="text" id="reportId" placeholder="Paste Private Report UUID (e.g. 1234-abcd)">
        <button id="loadBtn">
            <span>Load Report</span>
        </button>
    </div>

    <div id="error-msg"></div>
    <div id="stats-bar"></div>

    <table id="resultsTable" style="display: none;">
        <thead>
            <tr>
                <th>Type</th>
                <th>Input Field</th>
                <th>Severity</th>
                <th>AI Explanation & Fix</th>
            </tr>
        </thead>
        <tbody id="resultsBody">
            <!-- Populated via JS -->
        </tbody>
    </table>
</div>

<script>
    const scanBtn = document.getElementById('scanBtn');
    const targetUrlInput = document.getElementById('targetUrl');
    const loadBtn = document.getElementById('loadBtn');
    const reportIdInput = document.getElementById('reportId');
    const loader = document.getElementById('loader');
    const errorMsg = document.getElementById('error-msg');
    const resultsTable = document.getElementById('resultsTable');
    const resultsBody = document.getElementById('resultsBody');
    const statsBar = document.getElementById('stats-bar');

    loadBtn.addEventListener('click', async () => {
        const rId = reportIdInput.value.trim();
        if (!rId) return showError("Please enter a valid report UUID.");
        
        resetUI();
        loadBtn.disabled = true;

        try {
            const response = await fetch(`http://127.0.0.1:8000/report/${rId}`);
            const data = await response.json();
            if (!response.ok) throw new Error(data.detail || "Report not found");
            
            data.report_id = rId; // inject for rendering
            renderResults(data);
        } catch (err) {
            showError(err.message);
        } finally {
            loadBtn.disabled = false;
        }
    });

    function resetUI() {
        errorMsg.style.display = 'none';
        resultsTable.style.display = 'none';
        statsBar.style.display = 'none';
        resultsBody.innerHTML = '';
    }

    scanBtn.addEventListener('click', async () => {
        const url = targetUrlInput.value.trim();
        if (!url) {
            showError("Please enter a valid URL.");
            return;
        }

        // Reset UI
        resetUI();
        scanBtn.disabled = true;
        loader.style.display = 'block';

        try {
            const response = await fetch('http://127.0.0.1:8000/scan', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: url })
            });

            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.detail || "An error occurred during scanning");
            }

            renderResults(data);

        } catch (err) {
            showError(err.message);
        } finally {
            scanBtn.disabled = false;
            loader.style.display = 'none';
        }
    });

    function showError(msg) {
        errorMsg.textContent = msg;
        errorMsg.style.display = 'block';
    }

    function renderResults(data) {
        statsBar.innerHTML = `Scan Complete! Found ${data.forms_found} forms. Total vulnerabilities: ${data.vulnerabilities.length}.<br><br><strong>Private Report UUID:</strong> <span class="code-payload">${data.report_id}</span><br><small>Save this UUID to revisit the report securely.</small>`;
        statsBar.style.display = 'block';
        resultsTable.style.display = 'table';

        if (data.vulnerabilities.length === 0) {
            resultsBody.innerHTML = `<tr><td colspan="4" class="empty-state">No vulnerabilities detected matching our payloads.</td></tr>`;
            return;
        }

        data.vulnerabilities.forEach(vuln => {
            const tr = document.createElement('tr');
            
            // Map severity to class name
            const sev = vuln.severity || 'Medium';
            tr.className = `${sev.toLowerCase()}-severity`;

            // Description logic (fallback if AI is missing)
            const descHtml = vuln.description 
                ? `<div class="ai-description">${escapeHtml(vuln.description)}</div>`
                : `<div class="ai-description">Found vulnerability using payload: <span class="code-payload">${escapeHtml(vuln.payload)}</span></div>`;

            tr.innerHTML = `
                <td><strong>${escapeHtml(vuln.type)}</strong></td>
                <td><code class="code-payload">${escapeHtml(vuln.input)}</code></td>
                <td><span class="severity-badge badge-${sev}">${sev}</span></td>
                <td>${descHtml}</td>
            `;

            resultsBody.appendChild(tr);
        });
    }

    function escapeHtml(unsafe) {
        if (!unsafe) return '';
        return unsafe.toString()
             .replace(/&/g, "&amp;")
             .replace(/</g, "&lt;")
             .replace(/>/g, "&gt;")
             .replace(/"/g, "&quot;")
             .replace(/'/g, "&#039;");
    }
</script>

</body>
</html>
